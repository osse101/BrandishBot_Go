name: overview
title: BrandishBot Overview
icon: ℹ️
color: '#9B59B6'

discord:
  description: |
    **Welcome to BrandishBot!** 🎮

    A live chatroom game engine that turns this Discord server into an interactive gaming experience with inventory, economy, crafting, and community progression.

    ## 🎯 Core Features

    **💰 Economy System**
    Buy, sell, and trade items. Earn money through gameplay and manage your wealth.

    **🎒 Inventory Management**
    Collect items, use lootboxes, and build your collection.

    **🗺️ Expeditions & Quests**
    Join forces with other players to explore dangerous lands and complete weekly challenges.

    **🌾 Farming & Harvest**
    Grow your wealth passively with the Compost system.

    **🔨 Crafting & Upgrades**
    Craft powerful items using recipes. Disassemble unwanted items for materials.

    **🎲 Gambling**
    Bet loot boxes against other players. Winner takes all!

    **🌳 Community Progression**
    Vote to unlock new features. Everyone contributes to grow the game together.

    **📊 Stats & Leaderboards**
    Track your progress. Compete with friends.

    ## 🚀 Getting Started

    1. Use `/profile` to see your profile
    2. Use `/inventory` to check your items
    3. Use `/search` to find loot
    4. Use `/info [feature]` to learn more

    ## 💬 Get Help

    - `/info commands` - View all available commands
    - `/info [feature]` - Learn about specific features
    - Ask in chat!

    ## 🎮 Let's Play!

    Start exploring with `/search` or check the `/leaderboard` to see top players!

streamerbot:
  description: 'BrandishBot: Interactive gaming bot! !info <feature> for details. Economy, inventory, crafting, gambling, expeditions, quests, farming, progression.'
