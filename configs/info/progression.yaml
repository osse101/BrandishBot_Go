name: progression
title: Community Progression
icon: 🌳
color: '#2ECC71'

discord:
  description: |
    **🌳 Community Progression**

    Unlock new features together through voting!

    ## 🗳️ How Voting Works

    The community decides which features to unlock next!

    **Vote for Features**
    ```
    /vote [feature-key]
    ```

    Example: `/vote feature_gamble`

    **Each vote:**
    - Costs engagement points
    - Contributes to unlock progress
    - Brings features closer to release
    - Shows community priorities

    ## 📊 Progression Tree

    Features are organized in a tree structure:
    - **Locked** - Not available yet
    - **Available** - Ready to vote on
    - **In Progress** - Being unlocked  
    - **Unlocked** - Active and usable!

    ## 🎯 Engagement Score

    Earn engagement by:
    - Sending messages
    - Using commands
    - Participating in events
    - Playing regularly
    - Helping others

    Use engagement to vote for features you want!

    ## 🏗️ Feature Types

    **Gameplay Features**
    - New game modes
    - Additional items
    - Special events
    - Bonus content

    **System Features**
    - Quality of life improvements
    - New commands
    - Enhanced mechanics
    - Community tools

    ## 📈 Track Progress

    **View Status**
    Check current progression state and vote counts

    **See Available** 
    View features ready for voting

    **Engagement Score**
    Check your voting power

    ## 💡 Tips

    - Vote for features you want most
    - Coordinate with your server
    - Engagement recharges over time
    - Some features unlock others
    - Popular features unlock faster!

    ## Community Impact

    Your votes matter! Together the community shapes the game's future.

    Participate and make your voice heard! 🎤

streamerbot:
  description: "Progression: Vote to unlock features together! !vote. Earn engagement by playing. Community decides what's next!"
